<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">

<!-- ============================================================
     template.html - шаблон вёрстки статьи Traffic Masters (traffic-masters.ru)
     Дизайн-токены и стили взяты из утверждённой статьи-эталона.
     Сборщик (assemble-html.mjs) подставляет:
       - <title> и <meta name="description"> из meta.json
       - тело статьи в маркер <!-- CONTENT -->
       - Schema.org JSON-LD (Article + FAQPage + BreadcrumbList) из meta.json
     Платформа публикации - Tilda (HTML-блок). Сохранены #allrecords-оверрайды.
     ============================================================ -->

<style>
  :root {
    --nx-dark: #181d3b;        /* основной текст и заголовки, тёмно-синий */
    --nx-gray: #5a6178;        /* вторичный/приглушённый текст */
    --nx-accent: #f07f2f;      /* акцент: маркеры, скроллбары, кнопки, FAQ */
    --nx-accent-hover: #d96a1a;/* hover акцента */
    --nx-link: #0080ff;        /* ссылки */
    --nx-link-hover: #0066ce;  /* hover ссылок */
    --nx-bg: #ffffff;          /* фон страницы */
    --nx-white: #ffffff;
    --nx-light: #f5f5f5;       /* светлый фон блоков, таблиц */
    --nx-border: #e7e7e7;      /* бордеры */
    --nx-radius: 20px;         /* крупный радиус */
    --nx-radius-sm: 10px;      /* мелкий радиус */
    --nx-radius-pill: 3000px;  /* пилюли (теги, кнопки) */
    --nx-font: 'Cygre', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  }

  /* Оверрайды для публикации в Tilda (HTML-блок внутри #allrecords) */
  #allrecords .nx-article { max-width: 780px; margin: 0 auto; }
  #allrecords a { color: var(--nx-link) !important; text-decoration: none !important; }
  #allrecords a:hover { border-bottom-color: var(--nx-link) !important; }

  .nx-article { max-width: 780px; margin: 0 auto; padding: 20px 16px 60px; font-family: var(--nx-font); color: var(--nx-dark); font-size: 17px; line-height: 1.7; }

  .nx-breadcrumbs { font-size: 14px; color: var(--nx-gray); margin-bottom: 24px; line-height: 1.5; }
  .nx-breadcrumbs a { color: var(--nx-link) !important; text-decoration: none !important; }
  .nx-breadcrumbs a:hover { text-decoration: underline !important; }
  .nx-breadcrumbs span { margin: 0 6px; color: var(--nx-border); }

  .nx-article h1 { font-size: 34px !important; line-height: 1.2 !important; font-weight: 700 !important; color: var(--nx-dark) !important; margin: 0 0 12px !important; letter-spacing: -0.01em; }
  .nx-article-date { font-size: 14px; color: var(--nx-gray); margin-bottom: 32px; }
  .nx-article h2 { font-size: 26px !important; line-height: 1.3 !important; font-weight: 700 !important; color: var(--nx-dark) !important; margin: 48px 0 16px !important; padding-top: 16px; letter-spacing: -0.01em; }
  .nx-article h3 { font-size: 20px !important; line-height: 1.35 !important; font-weight: 600 !important; color: var(--nx-dark) !important; margin: 32px 0 12px !important; }

  .nx-article p { margin: 0 0 16px; }
  .nx-article a { color: var(--nx-link) !important; text-decoration: none !important; border-bottom: 1px solid transparent; transition: border-color 0.2s, color 0.2s; }
  .nx-article a:hover { color: var(--nx-link-hover) !important; border-bottom-color: var(--nx-link-hover) !important; }
  .nx-article ul, .nx-article ol { margin: 0 0 16px; padding-left: 24px; }
  .nx-article li { margin-bottom: 8px; }
  .nx-article ul li::marker { color: var(--nx-accent); font-weight: 700; }
  .nx-article ol li::marker { color: var(--nx-accent); font-weight: 700; }

  .nx-article img { max-width: 100%; height: auto; border-radius: var(--nx-radius); margin: 24px 0; display: block; }
  .nx-article figure { margin: 24px 0; }
  .nx-article figure img { margin: 0; }

  .nx-article blockquote { margin: 32px 0; padding: 24px 32px; border-left: 6px solid var(--nx-accent); background: var(--nx-light); border-radius: 0 var(--nx-radius) var(--nx-radius) 0; font-style: italic; color: var(--nx-gray); }

  .nx-article b, .nx-article strong { font-weight: 700; color: var(--nx-dark); }

  .nx-toc { background: var(--nx-light); border: 1px solid var(--nx-border); border-radius: var(--nx-radius); margin-bottom: 36px; }
  .nx-toc-toggle { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; cursor: pointer; font-weight: 700; font-size: 16px; color: var(--nx-dark); user-select: none; background: none; border: none; width: 100%; font-family: var(--nx-font); text-align: left; }
  .nx-toc-toggle:hover { color: var(--nx-accent); }
  .nx-toc-arrow { transition: transform 0.3s; font-size: 12px; color: var(--nx-gray); }
  .nx-toc.open .nx-toc-arrow { transform: rotate(180deg); }
  .nx-toc-list { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; padding: 0 24px; }
  .nx-toc.open .nx-toc-list { max-height: 2000px; padding: 0 24px 20px; }
  .nx-toc-list ol { margin: 0; padding-left: 20px; list-style: decimal; }
  .nx-toc-list li { margin-bottom: 8px; font-size: 15px; line-height: 1.45; }
  .nx-toc-list a { color: var(--nx-link) !important; text-decoration: none !important; }
  .nx-toc-list a:hover { text-decoration: underline !important; }

  .nx-table-wrap { overflow-x: auto; margin: 24px 0; -webkit-overflow-scrolling: touch; }
  .nx-table-wrap::-webkit-scrollbar { height: 8px; }
  .nx-table-wrap::-webkit-scrollbar-track { background: var(--nx-light); border-radius: var(--nx-radius-sm); }
  .nx-table-wrap::-webkit-scrollbar-thumb { background: var(--nx-accent); border-radius: var(--nx-radius-sm); }
  .nx-table-wrap::-webkit-scrollbar-thumb:hover { background: var(--nx-accent-hover); }
  .nx-table-wrap { scrollbar-color: var(--nx-accent) var(--nx-light); scrollbar-width: thin; }
  .nx-table-wrap table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 15px; border-radius: var(--nx-radius); overflow: hidden; border: 1px solid var(--nx-border); }
  .nx-table-wrap th, .nx-table-wrap td { padding: 14px 16px; border-bottom: 1px solid var(--nx-border); text-align: left; vertical-align: top; }
  .nx-table-wrap th { font-weight: 700; background: var(--nx-dark); color: var(--nx-white); }
  .nx-table-wrap tr:last-child td { border-bottom: none; }
  .nx-table-wrap tr:nth-child(even) td { background: var(--nx-light); }

  .nx-wide { margin-left: calc(-50vw + 50%); margin-right: calc(-50vw + 50%); padding-left: 16px; padding-right: 16px; }

  .nx-chart { margin: 32px 0; padding: 24px; background: var(--nx-light); border-radius: var(--nx-radius); }
  .nx-chart h3 { margin: 0 0 4px !important; font-size: 18px !important; }
  .nx-chart-sub { font-size: 13px; color: var(--nx-gray); margin: 0 0 16px; }
  .nx-chart-note { font-size: 13px; color: var(--nx-gray); margin: 16px 0 0; font-style: italic; }

  .nx-faq { margin-top: 48px; }
  .nx-faq h2 { margin-bottom: 16px !important; }
  .nx-faq-item { border-bottom: 1px solid var(--nx-border); }
  .nx-faq-item summary { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; cursor: pointer; font-weight: 600; font-size: 17px; color: var(--nx-dark); font-family: var(--nx-font); line-height: 1.4; list-style: none; position: relative; padding-right: 40px; }
  .nx-faq-item summary::-webkit-details-marker { display: none; }
  .nx-faq-item summary::after { content: '▼'; position: absolute; right: 0; top: 50%; transform: translateY(-50%) rotate(0deg); font-size: 12px; color: var(--nx-accent); transition: transform 0.3s ease; }
  .nx-faq-item[open] > summary::after { transform: translateY(-50%) rotate(180deg); }
  .nx-faq-item summary:hover { color: var(--nx-accent); }
  .nx-faq-a { font-size: 15px; line-height: 1.6; color: var(--nx-gray); padding: 0 0 18px; }

  .nx-author { display: flex; align-items: center; gap: 16px; margin-top: 48px; padding: 24px; background: var(--nx-light); border: 1px solid var(--nx-border); border-radius: var(--nx-radius); }
  .nx-author-photo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; background: var(--nx-border); flex-shrink: 0; }
  .nx-author-info { min-width: 0; }
  .nx-author-name { font-weight: 700; font-size: 17px; color: var(--nx-dark); margin-bottom: 2px; }
  .nx-author-role { font-size: 14px; color: var(--nx-accent); margin-bottom: 6px; font-weight: 600; }
  .nx-author-bio { font-size: 14px; color: var(--nx-gray); line-height: 1.5; }

  .nx-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 32px 0; }
  .nx-tags a { display: inline-block; padding: 8px 16px; background: var(--nx-light); border: 1px solid var(--nx-border); border-radius: var(--nx-radius-pill); font-size: 14px; color: var(--nx-dark) !important; text-decoration: none !important; transition: background 0.2s, color 0.2s, border-color 0.2s; }
  .nx-tags a:hover { background: var(--nx-accent); color: var(--nx-white) !important; border-color: var(--nx-accent); }

  .nx-cta { margin: 40px 0; padding: 32px; background: var(--nx-dark); border-radius: var(--nx-radius); color: var(--nx-white); text-align: center; }
  .nx-cta h3 { color: var(--nx-white) !important; margin: 0 0 12px !important; font-size: 22px !important; }
  .nx-cta p { color: rgba(255,255,255,0.85); margin-bottom: 20px; }
  .nx-cta a.nx-btn { display: inline-block; padding: 14px 32px; background: var(--nx-accent); color: var(--nx-white) !important; border-radius: var(--nx-radius-pill); font-weight: 700; font-size: 16px; text-decoration: none !important; border: none !important; transition: background 0.2s; }
  .nx-cta a.nx-btn:hover { background: var(--nx-accent-hover); border: none !important; }

  @media (max-width: 600px) {
    .nx-article { padding: 16px 12px 48px; font-size: 16px; }
    .nx-article h1 { font-size: 26px !important; }
    .nx-article h2 { font-size: 21px !important; margin-top: 36px !important; }
    .nx-article h3 { font-size: 18px !important; }
    .nx-author { flex-direction: column; text-align: center; gap: 12px; }
    .nx-article blockquote { padding: 16px 20px; }
    .nx-cta { padding: 24px 20px; }
    .nx-cta h3 { font-size: 19px !important; }
    .nx-chart { padding: 16px; }
  }
</style>

<!-- Schema.org JSON-LD (Article + FAQPage + BreadcrumbList) добавляется сборщиком из meta.json -->

</head>
<body style="background: var(--nx-bg);">

<div class="nx-article">

  <!-- CONTENT -->

</div>

</body>
</html>
