<section class="pt-section">
  <div class="container">
    <!--IF:h2-->
    <div class="pt-section__head">
      <h2 class="pt-h2">{{h2}}</h2>
      <!--IF:subhead--><p class="pt-section__sub">{{subhead}}</p><!--/IF:subhead-->
    </div>
    <!--/IF:h2-->
    <div class="pt-cards <!--CLASS:cols-->">
      <!--REPEAT:items-->
      <div class="pt-card">
        <div class="pt-card__ico" aria-hidden="true">{{@index}}</div>
        <div class="pt-card__title">{{item.title}}</div>
        <div class="pt-card__text">{{item.text}}</div>
      </div>
      <!--/REPEAT:items-->
    </div>
  </div>
</section>
