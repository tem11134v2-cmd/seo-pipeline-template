<section class="pt-section">
  <div class="container">
    <!--IF:h2-->
    <div class="pt-section__head">
      <h2 class="pt-h2">{{h2}}</h2>
      <!--IF:subhead--><p class="pt-section__sub">{{subhead}}</p><!--/IF:subhead-->
    </div>
    <!--/IF:h2-->
    <div class="pt-faq">
      <!--REPEAT:items-->
      <details class="pt-faq__item">
        <summary>{{item.q}}</summary>
        <div class="pt-faq__a">{{item.a}}</div>
      </details>
      <!--/REPEAT:items-->
    </div>
  </div>
</section>
