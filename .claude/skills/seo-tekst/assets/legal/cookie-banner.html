<div class="pt-cookie" id="cookieBanner" role="dialog" aria-live="polite" aria-label="Уведомление об использовании cookie">
  <div class="pt-cookie__inner">
    <p class="pt-cookie__text">
      {{domain}} использует файлы cookie для корректной работы сайта, аналитики и показа релевантной рекламы. Продолжая пользоваться сайтом, вы соглашаетесь с использованием cookie в соответствии с Политикой использования cookie.
    </p>
    <div class="pt-cookie__actions">
      <button type="button" class="btn btn--primary pt-cookie__accept" onclick="acceptCookie()">Принять</button>
      <a class="pt-cookie__more" href="#cookie">Подробнее</a>
    </div>
  </div>
</div>
