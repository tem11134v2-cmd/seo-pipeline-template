<footer class="pt-footer">
  <div class="container pt-footer__grid">
    <div class="pt-footer__col pt-footer__col--about">
      <div class="pt-footer__company">{{company}}</div>
      <div class="pt-footer__req">ИНН {{inn}}</div>
      <div class="pt-footer__req">ОГРН {{ogrn}}</div>
    </div>
    <div class="pt-footer__col pt-footer__col--contacts">
      <div class="pt-footer__title">Контакты</div>
      <a class="pt-footer__link pt-footer__phone" href="tel:{{phone}}">{{phone}}</a>
      <a class="pt-footer__link pt-footer__email" href="mailto:{{email}}">{{email}}</a>
    </div>
    <div class="pt-footer__col pt-footer__col--address">
      <div class="pt-footer__title">Адрес</div>
      <address class="pt-footer__address">{{address}}</address>
    </div>
    <div class="pt-footer__col pt-footer__col--legal">
      <div class="pt-footer__title">Документы</div>
      <a class="pt-footer__link" href="#privacy">Политика конфиденциальности</a>
      <a class="pt-footer__link" href="#person-data-consent">Согласие на обработку ПДн</a>
      <a class="pt-footer__link" href="#cookie">Политика cookie</a>
    </div>
  </div>
  <div class="pt-footer__bottom">
    <div class="container pt-footer__bottom-inner">
      <span class="pt-footer__copy">&copy; {{domain}}</span>
      <span class="pt-footer__date">Редакция от {{date}}</span>
    </div>
  </div>
</footer>
